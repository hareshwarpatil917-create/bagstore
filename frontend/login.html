<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login – BagStore</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <a class="logo" href="index.html">👜 BagStore</a>
    <div>
      <a href="products.html">Products</a>
      <a href="cart.html">Cart</a>
      <a href="login.html">Login</a>
    </div>
  </nav>
  <div class="auth-box">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button class="btn" onclick="login()">Login</button>
    <p class="msg" id="msg"></p>
    <p style="margin-top:14px; font-size:14px;">No account? <a href="#" onclick="showRegister()">Register</a></p>
    <div id="reg-section" style="display:none; margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
      <h2>Register</h2>
      <input type="text" id="reg-name" placeholder="Name">
      <input type="email" id="reg-email" placeholder="Email">
      <input type="password" id="reg-password" placeholder="Password">
      <button class="btn" onclick="register()">Register</button>
      <p class="msg" id="reg-msg"></p>
    </div>
  </div>
  <script src="js/login.js"></script>
</body>
</html>
